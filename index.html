<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour nos 2 ans ❤️</title>
    
    <!-- Ajout de la bibliothèque EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 { color: #d63031; font-size: 2rem; margin: 20px; padding: 0 20px; }
        p { color: #2d3436; font-size: 1.2rem; padding: 0 20px; }

        img {
            max-width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .btn-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        button:active { transform: scale(0.95); }

        #btn-oui { background-color: #ff7675; color: white; z-index: 10; }
        #btn-non { background-color: #b2bec3; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ÉTAPE 1 : L'ACCUEIL -->
    <div id="etape1">
        <img src="https://media.giphy.com/media/xT0xeF0s88zXGEA90Q/giphy.gif" alt="Cute Hello GIF">
        <h1>Joyeux 2 ans mon amour ! ❤️</h1>
        <p>J'ai une petite question très importante à te poser...</p>
        <button id="btn-commencer" style="background-color: #ff7675; color: white;">Voir la question</button>
    </div>

    <!-- ÉTAPE 2 : LA QUESTION -->
    <div id="etape2" class="hidden">
        <img id="image-question" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="Please GIF">
        <h1>Acceptes-tu de venir au "Coupain Dinner" avec moi ? 🍽️🍷</h1>
        <div class="btn-container">
            <button id="btn-oui">OUI ! 😍</button>
            <button id="btn-non">Non 😒</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : LA RÉUSSITE -->
    <div id="etape3" class="hidden">
        <img src="https://media.giphy.com/media/11sBLVxIR71zCG/giphy.gif" alt="Yay GIF">
        <h1>Youpiiiii ! 🎉❤️</h1>
        <p>C'était sûr que tu allais dire oui !</p>
        <p>Regarde tes mails, tu devrais avoir reçu ta confirmation officielle... 👀💌</p>
    </div>

    <script>
        // --- INITIALISATION EMAILJS ---
        // REMPLACE "TA_PUBLIC_KEY" PAR TA CLÉ PUBLIQUE EMAILJS
        emailjs.init("rFtavs3vyFiC5Yyf9"); 

        const etape1 = document.getElementById('etape1');
        const etape2 = document.getElementById('etape2');
        const etape3 = document.getElementById('etape3');
        
        const btnCommencer = document.getElementById('btn-commencer');
        const btnOui = document.getElementById('btn-oui');
        const btnNon = document.getElementById('btn-non');
        const imageQuestion = document.getElementById('image-question');

        const phrasesNon = [
            "T'es sûre ? 🤨",
            "Vraiment sûre ?? 🥺",
            "Pense au bon repas... 🤤",
            "Tu vas briser mon cœur 💔",
            "Je vais pleurer... 😭",
            "Coupain sera tout seul 😿",
            "Allez dis oui stp 🙏",
            "D'accord, t'as gagné... 😔",
            "JE RIGOLE, OUI ! ❤️"
        ];

        let indexNon = 0;
        let tailleBoutonOui = 1.2; 

        btnCommencer.addEventListener('click', () => {
            etape1.classList.add('hidden');
            etape2.classList.remove('hidden');
        });

        // --- FONCTION QUAND ELLE DIT OUI ---
        function declencherOui() {
            etape2.classList.add('hidden');
            etape3.classList.remove('hidden');

            // Envoi de l'email en arrière-plan
            // REMPLACE PAR TES ID EMAILJS ICI
            emailjs.send("service_i1ytmjg", "template_ztc1btf")
                .then(function(response) {
                    console.log("Email envoyé avec succès !", response.status, response.text);
                }, function(error) {
                    console.log("Erreur lors de l'envoi de l'email...", error);
                });
        }

        btnOui.addEventListener('click', declencherOui);

        btnNon.addEventListener('click', () => {
            if (indexNon < phrasesNon.length - 1) {
                btnNon.innerText = phrasesNon[indexNon];
                indexNon++;

                tailleBoutonOui += 0.8; 
                btnOui.style.fontSize = `${tailleBoutonOui}rem`;
                btnOui.style.padding = `${tailleBoutonOui * 10}px ${tailleBoutonOui * 20}px`;

                if (indexNon === 3) {
                    imageQuestion.src = "https://media.giphy.com/media/3o6wrvdHFbwBrUFenu/giphy.gif"; 
                }
                if (indexNon === 5) {
                    imageQuestion.src = "https://media.giphy.com/media/qQdL532nCG9wY/giphy.gif"; 
                }
            } else {
                btnNon.innerText = phrasesNon[phrasesNon.length - 1];
                btnNon.style.backgroundColor = "#ff7675"; 
                btnNon.addEventListener('click', declencherOui); // Déclenche le OUI et l'email !
            }
        });
    </script>

</body>
</html>
